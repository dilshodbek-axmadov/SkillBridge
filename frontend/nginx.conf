server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text-based assets (Nginx serves the precompressed bundles fine,
    # but most CDN/Azure setups still want runtime gzip too).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Vite hashes filenames in /assets/, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must be revalidated on every deploy — short cache.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA fallback: any unknown path -> index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: tiny health endpoint for Azure liveness probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
